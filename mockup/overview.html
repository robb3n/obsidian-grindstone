<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grindstone — Overview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg-deep: #1a1a1e;
    --bg-surface: #222226;
    --bg-elevated: #2a2a2f;
    --bg-hover: #32323a;
    --border: #3a3a42;
    --border-subtle: #2e2e35;

    --text-primary: #e0ddd8;
    --text-secondary: #8a8780;
    --text-tertiary: #5a5854;

    --accent-ember: #c4613a;
    --accent-ember-dim: #8a4428;
    --accent-ember-glow: #e07040;
    --accent-steel: #6a8fa8;
    --accent-steel-dim: #4a6a80;
    --accent-forge: #b89a5a;
    --accent-forge-dim: #7a6a3a;

    --hard-color: #c44a3a;
    --good-color: #6a8fa8;
    --easy-color: #5a9a6a;

    --radius: 6px;
    --radius-lg: 10px;

    --font-mono: 'DM Mono', 'SF Mono', monospace;
    --font-body: 'Noto Sans SC', -apple-system, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grindstone-overview {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ── Header ── */
  .overview-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .overview-header .brand-mark {
    width: 3px;
    height: 20px;
    background: var(--accent-ember);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(196, 97, 58, 0.3);
  }

  .overview-header h1 {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ── Today Banner ── */
  .today-banner {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .today-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-ember-dim), transparent);
  }

  .today-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .today-stats {
    display: flex;
    gap: 40px;
  }

  .stat-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 300;
    line-height: 1;
    color: var(--text-primary);
  }

  .stat-block:first-child .stat-value {
    color: var(--accent-ember-glow);
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    align-self: center;
  }

  .btn-review {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    background: var(--accent-ember);
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(196, 97, 58, 0.2);
  }

  .btn-review:hover {
    background: var(--accent-ember-glow);
    box-shadow: 0 2px 16px rgba(196, 97, 58, 0.35);
    transform: translateY(-1px);
  }

  /* ── Grid ── */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
  }

  .panel-title {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* ── Bar Chart ── */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 100px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    position: relative;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    animation: bar-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .bar-col:nth-child(1) .bar { animation-delay: 0.05s; }
  .bar-col:nth-child(2) .bar { animation-delay: 0.1s; }
  .bar-col:nth-child(3) .bar { animation-delay: 0.15s; }
  .bar-col:nth-child(4) .bar { animation-delay: 0.2s; }
  .bar-col:nth-child(5) .bar { animation-delay: 0.25s; }
  .bar-col:nth-child(6) .bar { animation-delay: 0.3s; }
  .bar-col:nth-child(7) .bar { animation-delay: 0.35s; }

  @keyframes bar-rise {
    from {
      height: 0 !important;
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  .bar-ember {
    background: linear-gradient(to top, var(--accent-ember-dim), var(--accent-ember));
  }

  .bar-steel {
    background: linear-gradient(to top, var(--accent-steel-dim), var(--accent-steel));
  }

  .bar:hover {
    filter: brightness(1.2);
  }

  .bar-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .bar-col:hover .bar-count {
    opacity: 1;
  }

  .bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
  }

  /* ── Maturity Segments ── */
  .maturity-track {
    height: 28px;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    margin-bottom: 14px;
    background: var(--bg-deep);
  }

  .maturity-segment {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-primary);
    transition: flex-basis 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    min-width: 32px;
  }

  .seg-new {
    background: var(--accent-ember-dim);
    border-right: 1px solid var(--bg-deep);
  }

  .seg-learning {
    background: var(--accent-steel-dim);
    border-right: 1px solid var(--bg-deep);
  }

  .seg-mature {
    background: var(--accent-forge-dim);
  }

  .maturity-legend {
    display: flex;
    gap: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  .legend-dot.new { background: var(--accent-ember-dim); }
  .legend-dot.learning { background: var(--accent-steel-dim); }
  .legend-dot.mature { background: var(--accent-forge-dim); }

  .legend-count {
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    font-size: 11px;
  }

  /* ── Rating Distribution ── */
  .rating-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .rating-label {
    font-family: var(--font-mono);
    font-size: 11px;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .rating-label.hard { color: var(--hard-color); }
  .rating-label.good { color: var(--good-color); }
  .rating-label.easy { color: var(--easy-color); }

  .rating-track {
    flex: 1;
    height: 18px;
    background: var(--bg-deep);
    border-radius: 3px;
    overflow: hidden;
  }

  .rating-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    animation: fill-expand 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fill-expand {
    from { width: 0 !important; }
  }

  .rating-fill.hard {
    background: linear-gradient(90deg, var(--hard-color), #d45a4a);
    animation-delay: 0.1s;
  }
  .rating-fill.good {
    background: linear-gradient(90deg, var(--good-color), #7aa0b8);
    animation-delay: 0.2s;
  }
  .rating-fill.easy {
    background: linear-gradient(90deg, var(--easy-color), #6aaa7a);
    animation-delay: 0.3s;
  }

  .rating-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    width: 36px;
    flex-shrink: 0;
  }

  /* ── Study Time ── */
  .time-bar-chart .bar-col .bar-count {
    font-size: 9px;
  }

  /* ── Tag Overview ── */
  .tag-panel {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
  }

  .tag-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: var(--radius);
    transition: background 0.15s;
  }

  .tag-row:hover {
    background: var(--bg-hover);
  }

  .tag-name {
    font-size: 13px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .tag-name .prefix {
    color: var(--text-tertiary);
  }

  .tag-name .leaf {
    color: var(--text-primary);
  }

  .tag-count-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag-micro-bar {
    width: 60px;
    height: 4px;
    background: var(--bg-deep);
    border-radius: 2px;
    overflow: hidden;
  }

  .tag-micro-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent-steel-dim);
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .tag-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-tertiary);
    min-width: 20px;
    text-align: right;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .data-grid {
      grid-template-columns: 1fr;
    }

    .today-content {
      flex-direction: column;
      align-items: flex-start;
    }

    .today-stats {
      gap: 24px;
    }

    .stat-value {
      font-size: 28px;
    }
  }
</style>
</head>
<body>

<div class="grindstone-overview">

  <!-- Header -->
  <div class="overview-header">
    <div class="brand-mark"></div>
    <h1>Grindstone</h1>
  </div>

  <!-- Today Banner -->
  <div class="today-banner">

      <button class="btn-review">开始复习</button>
    </div>
  </div>

  <!-- Data Grid -->
  <div class="data-grid">

      <div class="bar-chart">

          <span class="bar-label">08</span>

        <div class="bar-col">
          <span class="bar-count">8</span>
          <div class="bar bar-ember" style="height: 67%"></div>
          <span class="bar-label">09</span>
        </div>
        <div class="bar-col">
          <span class="bar-count">3</span>
          <div class="bar bar-ember" style="height: 25%"></div>
          <span class="bar-label">10</span>
        </div>
        <div class="bar-col">
          <span class="bar-count">12</span>
          <div class="bar bar-ember" style="height: 100%"></div>
          <span class="bar-label">11</span>

        <div class="bar-col">

          <span class="bar-count">9</span>
          <div class="bar bar-ember" style="height: 75%"></div>
          <span class="bar-label">14</span>
        </div>
      </div>
    </div>

    <!-- Card Maturity -->
    <div class="panel">
      <div class="panel-title">卡片成熟度</div>
      <div class="maturity-track">
        <div class="maturity-segment seg-new" style="flex-basis: 27.3%">15</div>
        <div class="maturity-segment seg-learning" style="flex-basis: 58.2%">32</div>
        <div class="maturity-segment seg-mature" style="flex-basis: 14.5%">8</div>
      </div>
      <div class="maturity-legend">
        <div class="legend-item">
          <div class="legend-dot new"></div>

          <span class="legend-count">15</span>

        <div class="legend-item">
          <div class="legend-dot learning"></div>

    <!-- Rating Distribution -->
    <div class="panel">

            <div class="rating-fill hard" style="width: 23%"></div>
          </div>

        </div>
        <div class="rating-row">
          <span class="rating-label good">Good</span>
          <div class="rating-track">
            <div class="rating-fill good" style="width: 58%"></div>
          </div>
          <span class="rating-pct">58%</span>
        </div>
        <div class="rating-row">
          <span class="rating-label easy">Easy</span>
          <div class="rating-track">
            <div class="rating-fill easy" style="width: 19%"></div>
          </div>
          <span class="rating-pct">19%</span>

    </div>

    <!-- Daily Study Time -->
    <div class="panel">

      <div class="tag-row">

        <span class="tag-name"><span class="prefix">#考研数学/</span><span class="leaf">线代</span></span>

            <div class="tag-micro-fill" style="width: 39%"></div>
          </div>
          <span class="tag-count">11</span>
        </div>
      </div>

  </div>

</div>

</body>
